<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAG-ID | Sovereign Identity Gateway</title>
    <style>
        :root {
            --accent: #9266cc;
            --gold: #ffb300;
            --bg: #0a0a0a;
            --card: rgba(255, 255, 255, 0.03);
            --text: #e0e0e0;
            --muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        /* --- Estilo Industrial de Fondo --- */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(146, 102, 204, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(146, 102, 204, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .gateway-card {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 60px 40px;
            border-radius: 32px;
            max-width: 500px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-text {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: white;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .logo-accent { color: var(--accent); }

        .protocol-tag {
            color: var(--accent);
            font-weight: 800;
            font-size: 0.8rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
            display: block;
        }

        p { color: #888; font-size: 0.95rem; margin-bottom: 40px; line-height: 1.6; }

        .enter-btn {
            display: inline-block;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 18px 45px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(146, 102, 204, 0.4);
        }
        .enter-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(146, 102, 204, 0.6);
            background: #a37be0;
        }

        footer {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="gateway-card">
        <div class="logo-text">LAG<span class="logo-accent">-ID</span></div>
        <span class="protocol-tag">Sovereign Protocol (LSP)</span>
        
        <p>Tu identidad, tus reglas, nuestra comunidad.<br>Bienvenido a la infraestructura descentralizada de simulación.</p>
        
        <a href="docs/index.html" class="enter-btn">Entrar a la Wiki</a>
    </div>

    <footer>
        Developed by dr.will for CONVOYRAMA • Licencia GNU GPL v3.0
    </footer>
</body>
</html>
