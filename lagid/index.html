<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAG-ID | Sovereign Gateway</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #9266cc;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }
        .loader {
            border: 2px solid rgba(146, 102, 204, 0.1);
            border-top: 2px solid #9266cc;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .logo { font-weight: 900; letter-spacing: 10px; font-size: 2rem; color: white; margin-bottom: 10px; }
        p { font-size: 0.7rem; letter-spacing: 3px; color: #444; text-transform: uppercase; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <div class="logo">LAG-ID</div>
        <p id="msg">Redirecting to Sovereign Wiki...</p>
    </div>

    <script>
        // SMART BYPASS LOGIC
        const lang = localStorage.getItem('lagid_wiki_lang') || 
                     (navigator.language.startsWith('es') ? 'es' : 
                      navigator.language.startsWith('pt') ? 'pt' : 'en');
        
        // Persist for the Wiki to pick up
        localStorage.setItem('lagid_wiki_lang', lang);
        
        // Update message based on detection
        const msgs = {
            'en': 'Redirecting to Sovereign Wiki...',
            'es': 'Redirigiendo a la Wiki Soberana...',
            'pt': 'Redirecionando para a Wiki Soberana...'
        };
        document.getElementById('msg').innerText = msgs[lang] || msgs['en'];

        // Execute Bypass
        setTimeout(() => {
            window.location.href = 'docs/index.html';
        }, 800);
    </script>
</body>
</html>
