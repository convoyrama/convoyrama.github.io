<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Header Premium | Convoyrama</title>
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        :root {
            --nav-bg: rgba(18, 18, 18, 0.8);
            --nav-accent: #00aaff;
            --nav-text: #ffffff;
            --nav-border: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            padding-top: 80px;
            background-color: #0f0f0f;
        }

        .modern-header {
            position: fixed;
            top: 15px; /* Flotando un poco desde arriba */
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 1200px;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--nav-border);
            border-radius: 50px; /* Estilo cápsula */
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 25px;
        }

        .nav-brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            gap: 12px;
            transition: transform 0.3s ease;
        }

        .nav-brand:hover {
            transform: scale(1.02);
        }

        .nav-logo {
            width: 28px;
            height: 28px;
            filter: drop-shadow(0 0 5px rgba(90, 165, 25, 0.5));
        }

        .nav-name {
            color: var(--nav-text);
            font-weight: 900;
            font-size: 1.1rem;
            text-transform: uppercase;
            font-style: italic;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 700;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid transparent !important;
            margin: 0 !important;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #fff !important;
            border-color: rgba(255, 255, 255, 0.1) !important;
        }

        .nav-links a.active {
            background: var(--nav-accent);
            color: #fff !important;
            box-shadow: 0 4px 15px rgba(90, 165, 25, 0.3);
        }

        /* Menú Hamburguesa */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 20px;
            height: 2px;
            background: var(--nav-text);
            border-radius: 2px;
            transition: 0.3s;
        }

        @media (max-width: 950px) {
            .menu-toggle { display: flex; }
            .nav-links {
                position: absolute;
                top: 70px;
                right: 0;
                width: 200px;
                background: var(--nav-bg);
                backdrop-filter: blur(20px);
                border: 1px solid var(--nav-border);
                border-radius: 20px;
                flex-direction: column;
                padding: 15px;
                gap: 5px;
                opacity: 0;
                transform: translateY(-10px);
                pointer-events: none;
                transition: all 0.3s ease;
            }
            .nav-links.open {
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
            }
            .nav-links a {
                width: 100%;
                box-sizing: border-box;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="modern-header">
        <div class="nav-container">
            <a href="../index.html" class="nav-brand">
                <img src="../assets/images/cr.png" alt="Convoyrama Logo" class="nav-logo">
                <span class="nav-name">Convoyrama</span>
            </a>

            <div class="menu-toggle" id="mobile-menu">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <nav class="nav-links" id="nav-list">
                <a href="../index.html" class="active">Home</a>
                <a href="../tuppertruck.html">TupperTruck</a>
                <a href="../id.html">Licencia</a>
                <a href="../event.html">Evento</a>
                <a href="../lagfm/index.html">LAG FM</a>
                <a href="../lagdrive.html">LAGDrive</a>
                <a href="../pitstop.html">PitStop</a>
            </nav>
        </div>
    </header>

    <main style="max-width: 800px; margin: 40px auto; color: #fff; text-align: center;">
        <h2>Vista Previa del Nuevo Header</h2>
        <p>Ahora flota suavemente y tiene botones con estilo cápsula.</p>
    </main>

    <script>
        const mobileMenu = document.getElementById('mobile-menu');
        const navList = document.getElementById('nav-list');

        mobileMenu.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            navList.classList.toggle('open');
        });

        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                mobileMenu.classList.remove('open');
                navList.classList.remove('open');
            });
        });
    </script>
</body>
</html>
