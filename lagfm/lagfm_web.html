<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LAG FM - Sintonizador Web</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141414">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="icon.png">
    
    <style>
        :root {
            --vtc-green: #5AA519;
            --vtc-green-glow: rgba(90, 165, 25, 0.4);
            --vtc-black: #0c0c0c;
            --vtc-surface: #161616;
            --vtc-border: #222222;
            --vtc-text: #ffffff;
            --vtc-text-dim: #777777;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--vtc-black);
            color: var(--vtc-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
        }

        header {
            padding: 10px 15px;
            text-align: center;
            background: var(--vtc-black);
            border-bottom: 1px solid var(--vtc-border);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0;
        }

        .logo-text span { color: var(--vtc-green); }

        .player-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            overflow: hidden;
        }

        /* Pantalla de reproducción compacta y sin caja gris */
        .display-area {
            text-align: center;
            padding: 5px 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 80px;
        }

        #current-station {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 4px;
            color: var(--vtc-green);
            text-shadow: 0 0 10px var(--vtc-green-glow);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #status-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--vtc-text-dim);
            font-family: monospace;
        }

        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0;
        }

        .play-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid var(--vtc-green);
            background: transparent;
            color: var(--vtc-green);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px var(--vtc-green-glow);
        }

        .play-btn:active { transform: scale(0.9); }
        .play-btn svg { width: 30px; height: 30px; fill: currentColor; }

        /* Lista de emisoras compacta */
        .station-list {
            flex: 1;
            overflow-y: auto;
            background: rgba(255,255,255,0.01);
            border-radius: 12px;
            border: 1px solid var(--vtc-border);
            padding: 4px;
            scrollbar-width: none;
        }

        .station-list::-webkit-scrollbar { display: none; }

        .list-item {
            padding: 8px 12px;
            border-radius: 8px;
            margin-bottom: 2px;
            background: rgba(255,255,255,0.02);
            border: 1px solid transparent;
            transition: 0.2s;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .list-item:active { background: rgba(255,255,255,0.06); }

        .list-item.active {
            background: rgba(90, 165, 25, 0.08);
            border-color: rgba(90, 165, 25, 0.3);
        }

        .item-icon {
            width: 32px;
            height: 32px;
            background: var(--vtc-surface);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--vtc-green);
            font-weight: bold;
            font-size: 1rem;
            flex-shrink: 0;
            border: 1px solid var(--vtc-border);
        }

        .item-info { flex: 1; overflow: hidden; }
        .item-title { font-weight: bold; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-desc { font-size: 0.7rem; color: var(--vtc-text-dim); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        footer {
            padding: 8px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--vtc-text-dim);
            border-top: 1px solid var(--vtc-border);
        }

        .playing .play-btn {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 var(--vtc-green-glow); }
            70% { box-shadow: 0 0 0 10px rgba(90, 165, 25, 0); }
            100% { box-shadow: 0 0 0 0 rgba(90, 165, 25, 0); }
        }
    </style>
</head>
<body>
    <header>
        <p class="logo-text">LAG<span>FM</span></p>
    </header>

    <main class="player-main" id="player-root">
        <div class="display-area">
            <div id="status-label">LISTO</div>
            <div id="current-station">SELECCIONA EMISORA</div>
        </div>

        <div class="controls-row">
            <button class="play-btn" id="play-btn" aria-label="Reproducir">
                <svg viewBox="0 0 24 24" id="play-icon">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg viewBox="0 0 24 24" id="pause-icon" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>
        </div>

        <div class="station-list" id="list-root">
            <!-- Items generados dinámicamente -->
        </div>
    </main>

    <footer>
        © LAG'S SPEED - VERSION WEB PWA
    </footer>

    <script>
        const audio = new Audio();
        const playBtn = document.getElementById('play-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const stationLabel = document.getElementById('current-station');
        const statusLabel = document.getElementById('status-label');
        const listContainer = document.getElementById('list-root');
        const playerRoot = document.getElementById('player-root');

        let isPlaying = false;
        let currentId = null;

        async function init() {
            try {
                const response = await fetch('streams.json');
                const streams = await response.json();
                renderList(streams);
                
                if(streams.length > 0) {
                    setupStream(streams[0]);
                }
            } catch (err) {
                stationLabel.innerText = "ERROR DE CONEXIÓN";
            }
        }

        function renderList(streams) {
            listContainer.innerHTML = '';
            streams.forEach(s => {
                const item = document.createElement('div');
                item.className = 'list-item';
                item.id = `item-${s.id}`;
                item.innerHTML = `
                    <div class="item-icon">📻</div>
                    <div class="item-info">
                        <div class="item-title">${s.title}</div>
                        <div class="item-desc">${s.desc || 'Toca para sintonizar'}</div>
                    </div>
                `;
                item.onclick = () => {
                    setupStream(s);
                    if(!isPlaying) togglePlay();
                };
                listContainer.appendChild(item);
            });
        }

        function setupStream(s) {
            currentId = s.id;
            document.querySelectorAll('.list-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`item-${s.id}`)?.classList.add('active');
            
            stationLabel.innerText = s.title;
            audio.src = s.src;
            if(isPlaying) audio.play();
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
                playerRoot.classList.remove('playing');
                statusLabel.innerText = "PAUSADO";
            } else {
                audio.play().catch(e => {
                    statusLabel.innerText = "ERROR AL CARGAR";
                });
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
                playerRoot.classList.add('playing');
                statusLabel.innerText = "SINTONIZANDO...";
            }
            isPlaying = !isPlaying;
        }

        playBtn.onclick = togglePlay;

        audio.onplaying = () => statusLabel.innerText = "EN VIVO";
        audio.onwaiting = () => statusLabel.innerText = "BUFFERING...";
        audio.onerror = () => {
            statusLabel.innerText = "SEÑAL PERDIDA";
            if(isPlaying) togglePlay();
        };

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('SW Registered'));
        }

        init();
    </script>
</body>
</html>
